<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bullet-item { 
            list-style-type: disc; 
            margin-left: 25px; 
            font-size: 1.2rem; 
            color: #212529; 
            margin-bottom: 8px;
        }
        .info-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #0d6efd;
            color: white;
            font-size: 0.85rem;
            font-family: serif;
            font-weight: bold;
            font-style: italic;
            margin-left: 8px;
            cursor: pointer;
            vertical-align: middle;
            text-decoration: none;
        }
        .info-icon:hover {
            background-color: #0a58ca;
        }
        .hidden-radio { display: none; }
        .btn-vote { width: 140px; padding: 15px; font-size: 1.2rem; font-weight: bold; }
        
        /* 1. Alinha o texto do tooltip à esquerda conforme o anexo */
        .tooltip-inner {
            text-align: left !important;
            padding: 10px 12px !important;
        }
        /* Estilização extra para o título do tooltip ficar idêntico ao modelo */
        .tooltip-inner strong {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand">Anotador: <strong>{{ session['username'] }}</strong></span>
            <span class="text-white-50">Progresso: {{ progresso }} / 383</span>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Sair</a>
        </div>
    </nav>

    <div class="container mb-5" style="max-width: 750px;">
        <div class="card shadow-sm p-4">
            
            <h5 class="text-muted mb-2 text-capitalize">mensagem:</h5>
            <div class="p-3 bg-white border rounded mb-4" style="font-size: 1.2rem; line-height: 1.6; white-space: pre-wrap;">{{ sample['mensagem'] }}</div>

            <h5 class="text-muted mb-3 text-capitalize">classificação:</h5>
            
            <ul class="mb-5" id="labelsList">
                {% for label in labels %}
                    <li class="bullet-item" data-raw-label="{{ label }}">
                        <strong class="translated-text">{{ label }}</strong>
                        <!-- Adicionado data-bs-html="true" para permitir formatação dentro do tooltip -->
                        <span class="info-icon" data-bs-toggle="tooltip" data-bs-html="true" data-bs-placement="top" title="Carregando definição...">i</span>
                    </li>
                {% endfor %}
            </ul>

            <div class="text-center border-top pt-4">
                <h4 class="mb-4">Esta classificação está correta?</h4>
                <form id="voteForm" method="POST">
                    <input type="hidden" name="sample_id" value="{{ sample['id'] }}">
                    <label class="btn btn-success btn-vote mx-2 shadow-sm">
                        <input type="radio" name="answer" value="Sim" class="hidden-radio" onclick="submitForm()"> Sim
                    </label>
                    <label class="btn btn-danger btn-vote mx-2 shadow-sm">
                        <input type="radio" name="answer" value="Não" class="hidden-radio" onclick="submitForm()"> Não
                    </label>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const translationMap = {
            "anecdotal evidence": "Evidência anedótica",
            "outdated research": "Pesquisa Ultrapassada",
            "poor research quality": "Má Qualidade de Pesquisa",
            "fallibility of science": "Conhecimento Falível",
            "fabricated studies": "Estudos Fabricados",
            "selective reporting": "Reportamento Seletivo",
            "conspiracy": "Conspiração",
            "censorship": "Censura",
            "alternative products/therapies": "Produtos/Terapias Alternativas",
            "alternatives to vaccination": "Alternativas à Vacinação",
            "alarmism": "Alarmismo",
            "pseudoscientific claims": "Afirmações Pseudocientíficas",
            "correlation vs causation": "Confundindo correlação com causalidade",
            "financial misconduct": "Má Conduta Financeira",
            "autonomy rights": "Direito de Autonomia",
            "imperfect protection": "Proteção Imperfeita",
            "herd immunity": "Imunidade de Rebanho",
            "natural immunity": "Imunidade Natural",
            "low disease risk": "Riscos Insuficientes",
            "direct transmission": "Transmissão Direta",
            "specific side effects": "Efeitos Colaterais Específicos",
            "unsafe administration": "Aplicação Perigosa/Incompetência",
            "high-risk groups": "Indivíduos de Alto Risco",
            "viral myths": "Mitos Virais",
            "religious/ethical beliefs": "Crenças Religiosas e Éticas",
            "not misinformation": "Não desinformação"
        };

        const glossaryData = {
            "anecdotal evidence": "Uso de relatos pessoais no lugar de dados científicos.",
            "outdated research": "Uso de pesquisas antigas ou já comprovadas como falsas.",
            "poor research quality": "Reclamações sobre insuficiência ou a qualidade de estudos.",
            "fallibility of science": "Crença de que nunca se pode ter certeza sobre ciência.",
            "fabricated studies": "Criação de estudos científicos falsos.",
            "selective reporting": "Seleção de dados para apoiar uma narrativa e aplicar resultados fora do contexto correto.",
            "conspiracy": "Alegação de intenções ocultas e maléficas em ações de saúde.",
            "censorship": "Alegações de que informações contrárias são suprimidas.",
            "alternative products/therapies": "Promoção de treatments sem validação científica e venda de produtos de saúde com alegações falsas.",
            "alternatives to vaccination": "Alegações de que medidas ou tratamentos substituem vacinas.",
            "alarmism": "Disseminação de medos exagerados sobre tratamentos ou doenças. (Alegações sobre toxicidade de componentes de vacinas/tratamentos).",
            "pseudoscientific claims": "Afirmações que soam científicas, mas não são, utilizando de termos de pouco conhecimento público para fingir conhecimento.",
            "correlation vs causation": "Confundir correlação com causalidade.",
            "financial misconduct": "Ganância financeira como motor de decisões em saúde.",
            "autonomy rights": "Defesa do direito individual de recusar tratamentos.",
            "imperfect protection": "Argumentos de que vacinas/tratamentos não são 100% eficazes.",
            "herd immunity": "Argumentos de que a proteção dos outros já basta.",
            "natural immunity": "Defesa da imunidade adquirida naturalmente em vez de vacinação.",
            "low disease risk": "Dizer que doenças são pouco graves ou não causam qualquer problema, minimizando a necessidade de vacinação.",
            "direct transmission": "Medo de contrair doença através da vacinação/tratamento.",
            "specific side effects": "Relatos de efeitos adversos específicos.",
            "unsafe administration": "Problemas relacionados à forma de administração ou negligência na aplicação por parte de autoridades de saúde.",
            "high-risk groups": "Elegem grupos supostamente mais vulneráveis a riscos relacionados a tratamentos médicos e exageram nas exclamações (crianças, idosos, etc).",
            "viral myths": "Mitos de saúde amplamente disseminados online.",
            "religious/ethical beliefs": "Conflito entre vacinação/tratamento e crenças pessoais.",
            "not misinformation": "Mensagens livres de desinformação, factuais e informativas."
        };

        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll("#labelsList li").forEach(li => {
                const raw = li.getAttribute("data-raw-label").trim().toLowerCase();
                let displayLabel = li.getAttribute("data-raw-label").trim();
                
                if (translationMap[raw]) {
                    displayLabel = translationMap[raw];
                    li.querySelector(".translated-text").innerText = displayLabel;
                }

                const icon = li.querySelector(".info-icon");
                if (icon && glossaryData[raw]) {
                    // 2. Constrói a estrutura HTML exatamente como a do exemplo anexo: 
                    // Nome da Classe em negrito (strong) que quebra a linha automaticamente, seguido do texto descritivo.
                    const formattedTitle = `<strong>${displayLabel}</strong>${glossaryData[raw]}`;
                    icon.setAttribute("data-bs-title", formattedTitle);
                }
            });

            // Inicializa todos os Tooltips do Bootstrap da página
            const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
            const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl));
        });

        function submitForm() {
            const inputs = document.querySelectorAll('.btn-vote');
            inputs.forEach(i => i.classList.add('disabled', 'opacity-50'));
            setTimeout(() => {
                document.getElementById('voteForm').submit();
            }, 150);
        }
    </script>
</body>
</html>
